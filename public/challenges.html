<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M1778-Dungen | Challenges</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚔️ M1778-Dungen ⚔️</h1>
      <p class="subtitle">The Challenge Dungeon</p>
    </div>

    <div class="marquee"><span>🐴 Pony.gamer is in the dungeon! Good luck! 🐴 --- 💰 Every level = More donations! 💰 --- ⚔️ 10 Levels of chaos await! ⚔️</span></div>

    <div class="donation-tracker">
      <h3>💰 Donation Pool 💰</h3>
      <div class="donation-amount" id="donation-amount">0 $</div>
    </div>

    <div class="main-box">
      <h2>🗺️ Dungeon Map 🗺️</h2>
      <div class="divider"></div>

      <div class="levels-grid" id="levels-grid">
        <!-- Level cards are generated by JavaScript -->
      </div>
    </div>

    <!-- Game Area (shown when a level is opened) -->
    <div class="game-area" id="game-area">
      <div id="game-content">
        <!-- Game content is injected by JavaScript -->
      </div>
    </div>

    <div class="footer">
      <p>Created by <strong>M1778</strong> | M1778-Dungen &copy; 2024</p>
      <p class="footer-small"><a href="index.html" style="color:#666;">Back to Homepage</a></p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/challenges.js"></script>
</body>
</html>
